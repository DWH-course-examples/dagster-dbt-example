services:
  postgres:
    image: postgres:16.4
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
      POSTGRES_HOST_AUTH_METHOD: trust  # Добавьте это для разработки
    volumes:
#      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dagster-network

  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile.webserver
    container_name: dagster-webserver
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_IMAGE: examples-dagster-code:latest
      DAGSTER_POSTGRES_DB: dagster
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
#      dagster-code:
#        condition: service_healthy
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000"]
    networks:
      - dagster-network
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: dagster-daemon
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_IMAGE: examples-dagster-code:latest
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml
      - dagster_home:/opt/dagster/dagster_home
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
#      dagster-code:
#        condition: service_healthy
    command: ["dagster-daemon", "run"]
    networks:
      - dagster-network
    restart: unless-stopped

  dagster-code:
    build:
      context: .
      dockerfile: Dockerfile.code
    container_name: dagster-code
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
    volumes:
      - ./dagster_example:/opt/dagster/app/dagster_example
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
#    healthcheck:
#      test: [ "CMD", "dagster", "code-server", "healthcheck", "--host", "0.0.0.0", "--port", "4000" ]
#      interval: 5s
#      timeout: 5s
#      retries: 10
    command: ["dagster", "code-server", "start", "-h", "0.0.0.0", "-p", "4000", "-m", "dagster_example"]
    networks:
      - dagster-network
    restart: unless-stopped

volumes:
  postgres_data:
  dagster_home:

networks:
  dagster-network:
    driver: bridge